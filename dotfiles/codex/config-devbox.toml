model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
approval_policy = "never"
notify = ["bash", "-lc", "$HOME/.local/bin/terminal-title waiting; printf '\\a'"]

[features]
hooks = true

[marketplaces.aviator-plugins]
source_type = "git"
source = "https://github.com/aviator-co/agent-plugins.git"

[plugins."av-cli@aviator-plugins"]
enabled = true

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_DISABLE_TERMINAL_TITLE = "1"
